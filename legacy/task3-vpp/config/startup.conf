unix {
  nodaemon
  log /tmp/vpp.log
  full-coredump
  cli-listen /run/vpp/cli.sock
  gid vpp
}

api-trace { on }
api-segment { gid vpp }
socksvr { default }

cpu {
  main-core 0
  workers 0
}

buffers {
  buffers-per-numa 16384
  default data-size 2048
}

plugins {
  plugin dpdk_plugin.so { disable }
  plugin default { enable }
}
