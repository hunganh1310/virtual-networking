# ============================================================================
# VPP Startup Configuration — DPDK Mode (vfio-pci / HugePages)
# ============================================================================
# USE THIS FILE when VPP is operating with DPDK for userspace packet I/O.
# This mode bypasses the kernel for maximum throughput (line-rate capable).
#
# ⚠️  HARDWARE REQUIREMENTS:
#   - Physical NIC bound to vfio-pci (not available in WSL2 / nested-KVM)
#   - HugePages allocated (2MB or 1GB)
#   - IOMMU enabled in BIOS + kernel (intel_iommu=on or amd_iommu=on)
#
# Setup:
#   sudo ./scripts/setup-hugepages.sh
#   sudo modprobe vfio-pci
#   sudo dpdk-devbind.py --bind=vfio-pci <PCI_ADDR>
#
# Reference: https://fd.io/docs/vpp/latest/gettingstarted/progressivevpp/
# ============================================================================

unix {
  # nodaemon is intentionally absent: vpp.sh manages VPP via nohup + PID file
  log /tmp/vpp-dpdk.log
  full-coredump
  cli-listen /run/vpp/cli.sock
  gid vpp
}

api-trace { on }
api-segment { gid vpp }
socksvr { default }

# ---------------------------------------------------------------------------
# CPU Pinning (DPDK mode — multi-threaded)
# ---------------------------------------------------------------------------
# main-core: VPP control plane (keep off data-critical cores)
# corelist-workers: explicit core list for workers (e.g., "2-3" = cores 2 and 3)
#
# For a 4-core system:
#   core 0 = OS + main thread
#   cores 1-3 = VPP workers
# ---------------------------------------------------------------------------
cpu {
  main-core 0
  corelist-workers 1-3
  # scheduler-policy fifo
  # scheduler-priority 50
}

# ---------------------------------------------------------------------------
# Buffer Management (DPDK mode — larger pools for line-rate)
# ---------------------------------------------------------------------------
buffers {
  buffers-per-numa 65536       # 64k buffers ~128MB NUMA memory
  default data-size 2048
}

# ---------------------------------------------------------------------------
# DPDK Plugin Configuration
# ---------------------------------------------------------------------------
dpdk {
  # Each 'dev' entry binds a PCI device to DPDK.
  # Replace with your actual PCI addresses (lspci | grep Ethernet):
  #
  # Example: Intel X710 on PCIe slot 01:00.0
  dev 0000:01:00.0 {
    name eth0           # Logical interface name in VPP
    num-rx-queues 2     # Should match worker threads
    num-tx-queues 2
  }
  # dev 0000:01:00.1 {
  #   name eth1
  # }

  # Memory channels: match your CPU's memory channels (check dmidecode)
  num-mem-channels 2

  # HugePages socket memory (in MB) -- must match hugepages allocation
  # For 1GB pages: socket-mem 1024
  # For 2MB pages: socket-mem 512  (256 x 2MB = 512MB)
  socket-mem 512,0   # socket 0: 512MB, socket 1: 0 (single-socket machine)
}

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
plugins {
  # DPDK is enabled in this config
  plugin dpdk_plugin.so { enable }
  plugin default { enable }
}

# ---------------------------------------------------------------------------
# Statistics Segment
# ---------------------------------------------------------------------------
statseg {
  default
  per-node-counters on
}

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging {
  default-log-level debug       # Use 'info' in production
  default-syslog-log-level notice
}
