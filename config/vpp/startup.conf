# ============================================================================
# VPP Startup Configuration — TAP mode (no DPDK)
# ============================================================================
# Used for TAP-based bridging where VPP creates host-side TAP interfaces.
# DPDK plugin is disabled since we use kernel TAP interfaces.
#
# Reference: https://fd.io/docs/vpp/latest/configuration/reference.html
# ============================================================================

unix {
  # nodaemon is intentionally absent: vpp.sh launches VPP via 'nohup ... &'
  # and tracks its PID. If you run VPP manually, add 'nodaemon' here.
  log /tmp/vpp.log
  full-coredump
  cli-listen /run/vpp/cli.sock
  gid vpp

  # Uncomment for interactive debugging (must also add 'nodaemon' above):
  # interactive
}

api-trace { on }
api-segment { gid vpp }
socksvr { default }

# ---------------------------------------------------------------------------
# CPU Pinning
# ---------------------------------------------------------------------------
# main-core: VPP main thread (control plane)
# workers:   number of worker threads for packet processing
#
# For lab/nested-KVM, keep workers=0 (single-threaded).
# For bare-metal, set workers to match available cores minus 1.
# ---------------------------------------------------------------------------
cpu {
  main-core 0
  workers 0
}

# ---------------------------------------------------------------------------
# Buffer Management
# ---------------------------------------------------------------------------
# buffers-per-numa: Total packet buffers available per NUMA node.
#   - 16384 is conservative for lab (uses ~32MB memory)
#   - Production: 32768 or higher
# default data-size: Payload size per buffer (2048 = standard MTU + headers)
# ---------------------------------------------------------------------------
buffers {
  buffers-per-numa 16384
  default data-size 2048
}

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
# DPDK is disabled because we use TAP interfaces (kernel-based).
# All other plugins remain enabled (tap, l2, bridge-domain, etc.).
# ---------------------------------------------------------------------------
plugins {
  plugin dpdk_plugin.so { disable }
  plugin default { enable }
}

# ---------------------------------------------------------------------------
# Statistics Segment
# ---------------------------------------------------------------------------
# Enables /dev/shm/vpp-stats-segment for external stats consumers
# (Prometheus exporters, monitoring scripts, etc.)
# ---------------------------------------------------------------------------
statseg {
  default
  per-node-counters on
}

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging {
  default-log-level info
  default-syslog-log-level notice
}
