# ============================================================================
# Linux Bridge Topology — Task 1 equivalent
# ============================================================================
# Architecture:
#   VM1 (tap0) <---> br-test <---> (tap1) VM2
#
# Deploy:   sudo ./vnctl deploy linux-bridge
# Teardown: sudo ./vnctl teardown linux-bridge
# ============================================================================

engine: linux-bridge

bridge:
  name: br-test
  ip: "10.0.0.254/24"
  stp: false                        # Disable STP for lab environment

vms:
  vm1:
    role: upf                       # User Plane Function (5G)
    mac: "52:54:00:00:00:01"
    ip: "10.0.0.1/24"
    tap: tap0
    mode: foreground                # serial console → stdio
    image: vm1.qcow2
  vm2:
    role: gnodeb                    # gNodeB (5G Base Station)
    mac: "52:54:00:00:00:02"
    ip: "10.0.0.2/24"
    tap: tap1
    mode: background                # daemonize + telnet console
    console_port: 5556
    monitor_port: 55501
    image: vm2.qcow2
